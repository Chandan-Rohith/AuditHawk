<!-- ═══════════════════ SESSION VIEW ═══════════════════ -->
<div id="view-session" class="hidden">
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-2 text-sm">
      <button onclick="switchView('history')" class="text-[#FF6B35] hover:underline">History</button>
      <span class="text-[#555555]">›</span>
      <span class="font-semibold text-[#999999]" id="session-filename"></span>
    </div>
    <button onclick="downloadPDF()"
            class="bg-[#FF6B35] text-white px-5 py-2 rounded-lg font-semibold shadow hover:bg-[#e55a2b] transition">
      Download Dashboard
    </button>
  </div>
  <div id="session-dashboard"></div>
</div>

<script>
/* ═══════════════════ SESSION JS ═══════════════════ */

async function openSession(id, silent = false) {
  const sessionId = String(id);
  const sessionEntry = history.find(s => String(s.id) === sessionId);
  if (!sessionEntry) return;

  try {
    const res = await fetch(`/api/reports/${encodeURIComponent(sessionId)}`);
    const data = await res.json();
    if (!res.ok || !data.success) {
      alert(data.message || "Failed to load report details.");
      return;
    }

    transactions = (data.transactions || []).map((tx) => ({
      id: tx.id,
      transaction_id: tx.transactionId,
      date: tx.date,
      amount: tx.amount,
      merchant: tx.merchant,
      category: tx.category,
      account_id: tx.accountId,
    }));

    frauds = (data.frauds || []).map((tx) => ({
      id: tx.id,
      transaction_id: tx.transactionId,
      amount: tx.amount,
      risk_score: tx.riskScore,
      decision: tx.decision,
      explanation: tx.explanation,
      status: tx.decision, // Map decision to status so UI logic works perfectly
    }));

    activeReportId = sessionId;
    riskScore = transactions.length ? Math.round((frauds.length / transactions.length) * 100) : 0;
  } catch (err) {
    console.error("Open session error:", err);
    alert("Failed to load report details.");
    return;
  }

  document.getElementById("session-filename").textContent = sessionEntry.fileName;

  // If silent === false, the user clicked from the History view (Lock it down!)
  // If silent === true, the upload modal triggered it for a fresh CSV (Keep it interactive!)
  window.isHistoryMode = !silent;

  // clone filled dashboard into session view
  const target = document.getElementById("session-dashboard");
  // re-use main dashboard rendering then copy
  renderDashboard();
  const filled = document.getElementById("dash-filled");
  target.innerHTML = filled.innerHTML;

  // re-init chart in session view (create a new canvas)
  const canvasOld = target.querySelector("#doughnut-chart");
  if (canvasOld) {
    const newCanvas = document.createElement("canvas");
    newCanvas.id = "session-chart";
    newCanvas.width = 300;
    newCanvas.height = 300;
    canvasOld.replaceWith(newCanvas);
    const fraudCount = frauds.filter(f => f.status !== "rejected").length;
    new Chart(newCanvas.getContext("2d"), {
      type: "doughnut",
      data: {
        labels: ["Legitimate", "Flagged"],
        datasets: [{ data: [transactions.length - fraudCount, fraudCount], backgroundColor: ["#22C55E", "#EF4444"], borderWidth: 0 }],
      },
    });
  }

  // hide download button in cloned dashboard (we have one in session header)
  const dlBtn = target.querySelector("#btn-download");
  if (dlBtn) dlBtn.classList.add("hidden");

  if (!silent) {
    switchView("session");
  }
}
</script>
