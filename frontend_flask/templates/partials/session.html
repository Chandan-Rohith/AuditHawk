<!-- ═══════════════════ SESSION VIEW ═══════════════════ -->
<div id="view-session" class="hidden">
  <div class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-2 text-sm">
      <button onclick="switchView('history')" class="text-[#FF6B35] hover:underline">History</button>
      <span class="text-[#555555]">›</span>
      <span class="font-semibold text-[#999999]" id="session-filename"></span>
    </div>
    <button onclick="downloadPDF()"
            class="bg-[#FF6B35] text-white px-5 py-2 rounded-lg font-semibold shadow hover:bg-[#e55a2b] transition">
      Download Dashboard
    </button>
  </div>
  <div id="session-dashboard"></div>
</div>

<script>
/* ═══════════════════ SESSION JS ═══════════════════ */

function openSession(id) {
  const session = history.find(s => s.id === id);
  if (!session) return;
  transactions = session.transactions;
  frauds = session.frauds;
  riskScore = session.riskScore;

  document.getElementById("session-filename").textContent = session.fileName;

  // clone filled dashboard into session view
  const target = document.getElementById("session-dashboard");
  // re-use main dashboard rendering then copy
  renderDashboard();
  const filled = document.getElementById("dash-filled");
  target.innerHTML = filled.innerHTML;

  // re-init chart in session view (create a new canvas)
  const canvasOld = target.querySelector("#doughnut-chart");
  if (canvasOld) {
    const newCanvas = document.createElement("canvas");
    newCanvas.id = "session-chart";
    newCanvas.width = 300;
    newCanvas.height = 300;
    canvasOld.replaceWith(newCanvas);
    const fraudCount = frauds.filter(f => f.status !== "rejected").length;
    new Chart(newCanvas.getContext("2d"), {
      type: "doughnut",
      data: {
        labels: ["Legitimate", "Flagged"],
        datasets: [{ data: [transactions.length - fraudCount, fraudCount], backgroundColor: ["#FF6B35", "#ef4444"], borderWidth: 0 }],
      },
    });
  }

  // hide download button in cloned dashboard (we have one in session header)
  const dlBtn = target.querySelector("#btn-download");
  if (dlBtn) dlBtn.classList.add("hidden");

  switchView("session");
}
</script>
