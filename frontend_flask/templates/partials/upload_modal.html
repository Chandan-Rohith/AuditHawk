<!-- ═══════════════════ UPLOAD MODAL ═══════════════════ -->
<div id="upload-modal" class="hidden fixed inset-0 z-50 items-center justify-center p-4 backdrop-blur-sm bg-black/10">
  <div class="bg-[#212121] w-full max-w-xl rounded-xl shadow-2xl border overflow-hidden">
    <!-- Header -->
    <div class="flex items-center justify-between px-8 pt-8 pb-4 border-b">
      <div>
        <h2 class="text-2xl font-bold">Upload Transactions</h2>
        <p class="text-[#777777] text-sm mt-1">Prepare your data for automated auditing.</p>
      </div>
      <button onclick="closeUpload()">✕</button>
    </div>
    <!-- Body -->
    <div class="p-8 space-y-8">
      <!-- Drop zone -->
      <div>
        <label class="block mb-2 text-sm font-bold">Upload CSV File *</label>
        <div id="drop-zone"
             onclick="document.getElementById('file-input').click()"
             class="border-2 border-dashed rounded-xl p-12 text-center transition-all cursor-pointer border-[#FF6B35]/30 bg-[#2D2D2D] hover:border-[#FF6B35]">
          <input id="file-input" type="file" accept=".csv" class="hidden" onchange="handleFileSelect(event)" />
          <div id="drop-placeholder">
            <div class="mb-3 text-5xl">📁</div>
            <p class="text-lg font-bold text-[#FF6B35] mb-2">Click to browse or drag &amp; drop</p>
            <p class="text-sm text-[#777777]">Accepts CSV files only</p>
          </div>
          <div id="drop-selected" class="hidden">
            <div class="mb-3 text-5xl">📄</div>
            <p class="text-lg font-bold text-green-700" id="selected-file-name"></p>
            <p class="text-sm text-[#777777] mt-1" id="selected-file-size"></p>
            <button onclick="event.stopPropagation(); removeFile()"
                    class="mt-3 text-sm text-red-600 hover:underline">Remove file</button>
          </div>
        </div>
      </div>
      <div>
        <label class="block mb-2 text-sm font-bold">Optional Threshold Limit</label>
        <input
          id="threshold-input"
          type="number"
          min="0"
          step="0.01"
          placeholder="e.g. 5000"
          class="w-full px-4 py-3 border border-[#3D3D3D] rounded-lg bg-[#1A1A1A] focus:ring-2 focus:ring-[#FF6B35] outline-none"
        />
        <p class="text-xs text-[#777777] mt-2">If set, all transactions above this amount are included in the flagged results.</p>
      </div>
      <div>
        <p class="text-sm text-[#FF6B35] mt-2">
          Uploaded CSV files are processed by the backend ML pipeline and saved to the database.
        </p>
      </div>
    </div>
    <!-- Footer -->
    <div class="px-8 py-6 bg-[#2D2D2D] border-t flex justify-end gap-3">
      <button onclick="closeUpload()" class="px-6 py-2 text-[#777777]">Cancel</button>
      <button id="btn-analyze" onclick="analyzeCSV()"
          class="px-8 py-2 bg-[#FF6B35] text-white font-bold rounded-lg shadow-lg transition-all duration-200">
      Analyze Transactions
      </button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════ UPLOAD MODAL JS ═══════════════════ */

function openUpload() {
  const modal = document.getElementById("upload-modal");
  modal.classList.remove("hidden");
  modal.classList.add("flex");
}
function closeUpload() {
  const modal = document.getElementById("upload-modal");
  modal.classList.add("hidden");
  modal.classList.remove("flex");
  document.getElementById("threshold-input").value = "";
  removeFile();
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file && file.name.endsWith(".csv")) {
    selectedFile = file;
    showSelectedFile();
  } else {
    alert("Please select a valid CSV file.");
  }
}

function showSelectedFile() {
  document.getElementById("drop-placeholder").classList.add("hidden");
  document.getElementById("drop-selected").classList.remove("hidden");
  document.getElementById("selected-file-name").textContent = selectedFile.name;
  document.getElementById("selected-file-size").textContent = (selectedFile.size / 1024).toFixed(2) + " KB";
  const dz = document.getElementById("drop-zone");
  dz.classList.remove("border-[#FF6B35]/30", "bg-[#2D2D2D]");
  dz.classList.add("border-green-500", "bg-green-900/20");
}

function removeFile() {
  selectedFile = null;
  document.getElementById("file-input").value = "";
  document.getElementById("drop-placeholder").classList.remove("hidden");
  document.getElementById("drop-selected").classList.add("hidden");
  const dz = document.getElementById("drop-zone");
  dz.classList.add("border-[#FF6B35]/30", "bg-[#2D2D2D]");
  dz.classList.remove("border-green-500", "bg-green-900/20");
}

// drag & drop
const dropZone = document.getElementById("drop-zone");
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("border-[#FF6B35]","bg-[#3D3D3D]"); });
dropZone.addEventListener("dragleave", e => { e.preventDefault(); dropZone.classList.remove("border-[#FF6B35]","bg-[#3D3D3D]"); });
dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("border-[#FF6B35]","bg-[#3D3D3D]");
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith(".csv")) { selectedFile = file; showSelectedFile(); }
  else alert("Please select a valid CSV file.");
});

/* ═══════════════════ CSV ANALYSIS ═══════════════════ */

async function analyzeCSV() {
  if (!selectedFile) { alert("Please upload a CSV file."); return; }
  
  // 🚨 1. Grab the button and trigger the visual loading state
  const btn = document.getElementById("btn-analyze");
  btn.disabled = true;
  btn.innerHTML = `<span class="animate-pulse">Analyzing matrix...</span>`;
  btn.classList.replace("bg-[#FF6B35]", "bg-[#555555]");
  btn.classList.add("cursor-not-allowed");

  const form = new FormData();
  form.append("file", selectedFile);

  const thresholdRaw = (document.getElementById("threshold-input").value || "").trim();
  if (thresholdRaw) {
    const thresholdValue = Number(thresholdRaw);
    if (!Number.isFinite(thresholdValue) || thresholdValue <= 0) {
      alert("Threshold must be a number greater than 0.");
      // Reset button if validation fails
      resetAnalyzeButton(btn);
      return;
    }
    form.append("thresholdLimit", String(thresholdValue));
  }

  try {
    const res = await fetch("/api/audit/upload", {
      method: "POST",
      body: form,
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      alert(data.message || "Upload failed.");
      return;
    }

    const report = data.report;
    if (!report || !report.id) {
      alert("Upload succeeded but no report was returned.");
      return;
    }

    await bootstrapData();
    await openSession(report.id, true);
    switchView("dashboard");
    closeUpload();
    
  } catch (err) {
    console.error("Upload error:", err);
    alert("Failed to upload and analyze CSV.");
  } finally {
    // 🚨 2. Always reset the button state when finished
    resetAnalyzeButton(btn);
  }
}

// Quick helper function to keep the code clean
function resetAnalyzeButton(btn) {
  if (!btn) return;
  btn.disabled = false;
  btn.innerText = "Analyze Transactions";
  btn.classList.replace("bg-[#555555]", "bg-[#FF6B35]");
  btn.classList.remove("cursor-not-allowed");
}
</script>
